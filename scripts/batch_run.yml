mech_other:
  instance_cache_policy:
  # ========================================================
  # 核心策略对比实验配置
  # 注意：使用 attention_lru 前需先启动模型服务：
  #   cd d:\serverless\serverless_sim\ml_training
  #   python serve_model.py --model models/attention_lru_cluster2018_v5.pth --port 5000
  # ========================================================
  
  # ==================== 1. 传统基线策略 ====================
  # - lru: "10"                                        # (6) 传统LRU策略
  # - fifo: "10"                                       # (7) 传统FIFO策略
  
  # ==================== 2. 环境感知LRU策略 ====================
  # 2.1 静态权重配置
  # - env_aware_lru: "10:c:0.3,m:0.2,f:0.3,r:0.2"     # (1) 均衡配置
  # - env_aware_lru: "10:c:0.5,m:0.1,f:0.3,r:0.1"     # (2) 冷启动优先
  # - env_aware_lru: "10:c:0.2,m:0.1,f:0.5,r:0.2"     # (3) 频率优先（最优教师策略）
  
  # 2.2 自适应模式
  - env_aware_lru: "10:adaptive"                     # (4) 自适应模式（权重自动调整）
  # - env_aware_lru: "10|adaptive|c:0.5,m:0.1,f:0.3,r:0.1"  # (5) 自适应+初始权重
  
  # ==================== 3. 加权LRU策略 ====================
  # - weighted_lru: "10:r:0.3,f:0.7"                   # (8) 加权LRU（最近性30% + 频率70%）
  
  # ==================== 暂时不运行的策略（已注释）====================
  # # 分区缓存策略
  # - partitioned: "10|cpu:0.35,data:0.35,mem:0.15,light:0.15"  # 固定权重分区
  # - partitioned: "10|equal"                          # 平均分配（25% × 4分区）
  # - partitioned: "10|dynamic|smart"                  # 动态分区（运行时自适应调整）
  # 
  # # 机器学习策略（需先启动模型服务）
  # # python serve_model.py --model models/attention_lru_cluster2018_v5.pth --port 5000
  # - attention_lru: "10"                              # Attention-LRU（智能学习策略）
  
  # ==================== 实验对比说明 ====================
  # 对比1：传统策略基线 (LRU vs FIFO vs 加权LRU)
  # 对比2：环境感知LRU不同权重配置 (均衡 vs 冷启动优先 vs 频率优先)
  # 对比3：静态权重 vs 自适应权重 (静态配置 vs adaptive vs adaptive+初始权重)
  # 对比4：分区容量分配影响 (CPU+数据优先 vs 平均 vs CPU+轻量优先)